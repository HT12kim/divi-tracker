[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."kr-stocks"]
  included_files = ["vite.config.csv"]

[functions."kr-etfs"]
  included_files = ["data_1131_*.csv"]

[functions."holdings"]
  included_files = ["vite.config.csv"]

[functions."capex"]
  included_files = ["netlify/functions/corp-codes.json"]

[[redirects]]
  from = "/api/etf-explorer"
  to = "/.netlify/functions/etf-explorer"
  status = 200

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
