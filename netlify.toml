[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."kr-stocks"]
  included_files = ["vite.config.csv"]

[functions."kr-etfs"]
  included_files = ["data_1131_*.csv"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
